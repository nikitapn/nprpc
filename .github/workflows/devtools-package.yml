name: Devtools Build And Release

on:
  pull_request:
    paths:
      - '.github/workflows/devtools-package.yml'
      - 'nprpc_devtools/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    tags:
      - 'devtools-v*'
    paths:
      - '.github/workflows/devtools-package.yml'
      - 'nprpc_devtools/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  build-and-pack:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: nprpc_devtools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nprpc_devtools/package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Type check
        run: npm run check

      - name: Build extension
        run: npm run build

      - name: Verify npm package contents
        run: npm run check:package

  release:
    if: startsWith(github.ref, 'refs/tags/devtools-v')
    runs-on: ubuntu-latest
    needs: build-and-pack

    defaults:
      run:
        working-directory: nprpc_devtools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nprpc_devtools/package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#devtools-v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          mkdir -p release
          npm pack --pack-destination release
          cd dist
          zip -qr "../release/nprpc-devtools-extension-${GITHUB_REF_NAME}.zip" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NPRPC DevTools ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            nprpc_devtools/release/*.tgz
            nprpc_devtools/release/*.zip